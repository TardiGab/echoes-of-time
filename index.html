<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/css/main.css">
    <script src="/js/main.js" type="module" defer></script>
    <link href="https://api.fontshare.com/v2/css?f[]=crimson-pro@401&display=swap" rel="stylesheet">
</head>

<body class="loading">
    <div class="begin disappear">
        <img class="begin__logo" src="assets/logo_storystack.png" alt="logo">

        <p class="begin__start">Press the <span>space bar</span> to begin this world</p>
    </div>
    <div class="page__wrapper">
        <main class="page__content">
            <div class="clues-container">
                <span class="clues">Indices trouvés :</span>
                <span class="clues-number">1 / 3</span>
            </div>
            <div class="progression-container">
                <!-- progression-coin__completed à enlever, il est mis juste pour montrer l'état complété -->
                <div class="progression-coin progression-coin__1 progression-coin__completed"></div>
                <div class="progression-coin progression-coin__2"></div>
                <div class="progression-coin progression-coin__3"></div>
                <div class="progression-coin progression-coin__4"></div>
            </div>
            <div class="canvas__wrapper | js-canvas-wrapper">
                <canvas class="canvas | js-canvas-3d"></canvas>
            </div>
        </main>
    </div>
</body>

</html>
